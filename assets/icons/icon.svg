<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" fill="#0a0b0d" rx="80"/>
  <!-- Subtle gold ring -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#e3b23c" stroke-width="6" opacity="0.3"/>
  <!-- Inner gold ring highlight -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#e3b23c" stroke-width="1.5" opacity="0.15"/>
  <!-- 50-0 main text -->
  <text
    x="256" y="300"
    text-anchor="middle"
    fill="#e3b23c"
    font-family="Impact, Arial Black, 'Arial Narrow', sans-serif"
    font-size="158"
    font-weight="900"
    letter-spacing="-6">50-0</text>
  <!-- UNBEATEN subtitle -->
  <text
    x="256" y="358"
    text-anchor="middle"
    fill="#e3b23c"
    font-family="Arial, Helvetica, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="10"
    opacity="0.6">UNBEATEN</text>
</svg>
